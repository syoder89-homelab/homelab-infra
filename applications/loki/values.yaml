loki:
  # ── Mode ────────────────────────────────────────────────────────────────────
  deploymentMode: SingleBinary

  loki:
    auth_enabled: false
    commonConfig:
      replication_factor: 1
    storage:
      type: filesystem
    schemaConfig:
      configs:
        - from: "2024-01-01"
          store: tsdb
          object_store: filesystem
          schema: v13
          index:
            prefix: loki_index_
            period: 24h
    compactor:
      working_directory: /var/loki/compactor
      delete_request_store: filesystem
      retention_enabled: true
    limits_config:
      retention_period: 720h  # 30 days

  # ── Single Binary ────────────────────────────────────────────────────────────
  singleBinary:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 256Mi
    persistence:
      enabled: true
      size: 35Gi
      storageClass: openebs-storage-persist

  # ── Disable distributed-mode components ─────────────────────────────────────
  read:
    replicas: 0
  write:
    replicas: 0
  backend:
    replicas: 0

  # ── Chunks Cache (memcached) ─────────────────────────────────────────────────
  # allocatedMemory is in MB; chart sets memory limit to floor(1.2 * allocatedMemory)
  # 5120 MB * 1.2 = 6144 MB = 6 Gi
  chunksCache:
    allocatedMemory: 5120
    allocatedCPU: 100m

  # ── Disable MinIO (using local filesystem) ───────────────────────────────────
  minio:
    enabled: false

  # ── Disable gateway and test components ──────────────────────────────────────
  gateway:
    enabled: false
  test:
    enabled: false
  monitoring:
    selfMonitoring:
      enabled: false
      grafanaAgent:
        installOperator: false
    lokiCanary:
      enabled: false
