{{- range $path, $_ := .Files.Glob "applications/*/Chart.yaml" }}
{{- $app := $.Files.Get $path | fromYaml }}
{{- range $env_name, $env := $.Values.envs }}
{{- if ne $env.enabled false }}
{{- if not $env.isEphemeral }}
{{- if or (not $app.clusterTypes) (has $env.clusterType ($app.clusterTypes | default list)) }}
---
apiVersion: kargo.akuity.io/v1alpha1
kind: Stage
metadata:
  name: {{ $env_name }}-{{ $app.name }}
  namespace: {{ $.Values.kargo.projectName }}
spec:
  requestedFreight:
  - origin:
      kind: Warehouse
      name: {{ $app.name }}
    sources:
      {{- /* Walk the promotedFrom chain to find the nearest enabled upstream stage,
           falling back to direct (warehouse) if all upstream stages are unavailable. */ -}}
      {{- $upstreamStage := "" }}
      {{- if $env.promotedFrom }}
        {{- $upstreamStage = trim (include "resolve-upstream-stage" (dict "envName" $env.promotedFrom "Values" $.Values "app" $app)) }}
      {{- end }}
      {{- if eq $upstreamStage "direct" }}
      direct: true
      {{- else if $upstreamStage }}
      stages:
      - {{ $upstreamStage }}-{{ $app.name }}
      {{- else }}
      {{- $ctx := (dict "Values" $.Values "app" $app "env" $env) }}
      {{- include "better-tpl" (list $env.sources $ctx) | nindent 6 }}
      {{- end }}

  promotionTemplate:
    spec:
      vars:
      - name: gitRepo
        value: {{ $.Values.repo.repoURL }}
      - name: targetBranch
        value: {{ $env.targetBranchPrefix }}/{{ $app.name }}
      - name: path_src
        value: ./src
      - name: path_out
        value: ./out
      steps:
      - task:
          name: prepare-workdir 
      # The config-generator chart needs access to the config manifests
      # Copy config manifests into config-generator chart
      - uses: copy
        config:
          inPath: {{`${{ vars.path_src }}`}}/config
          outPath: {{`${{ vars.path_src }}`}}/charts/config-generator/config/platform
      - uses: copy
        config:
          inPath: {{`${{ vars.path_src }}`}}/{{ dir $path }}/config
          outPath: {{`${{ vars.path_src }}`}}/charts/config-generator/config/application
      # Render the config files from templates
      - uses: helm-template
        config:
          releaseName: config-generator
          path: {{`${{ vars.path_src }}`}}/charts/config-generator
          outLayout: flat
          outPath: /tmp/values.yaml
          setValues:
            - key: envName
              value: {{ $env_name }}
            - key: envType
              value: {{ $env.envType }}
            - key: appName
              value: {{ $app.name }}
          #valuesFiles:
          #- {{`${{ vars.path_src }}`}}/config/{{ $env_name }}/{{ $app.name }}-values.yaml
          #- {{`${{ vars.path_src }}`}}/{{ dir $path }}/values/{{ $env_name }}.yaml
      - uses: helm-template
        config:
          releaseName: {{ $app.releaseName | default $app.name }}
          namespace: {{ $app.namespace | default $app.name }}
          buildDependencies: true
          includeCRDs: true
          path: {{`${{ vars.path_src }}`}}/{{ dir $path }}
          outPath: {{`${{ vars.path_out }}`}}/deploy/{{ $app.name }}
          valuesFiles:
          - /tmp/values.yaml
      - task:
          name: push-manifests
        as: promotion
        vars:
        - name: asPR
          value: "{{ $env.asPR }}"
        - name: targetBranch
          value: {{ $env.targetBranchPrefix }}/{{ $app.name }}
      - uses: argocd-update
        config:
          apps:
          - name: {{ $env_name }}-{{ $app.name }}
            sources:
            - repoURL: {{`${{ vars.gitRepo }}`}}
              desiredRevision: {{`${{ outputs.promotion.commit }}`}}
{{- end }}
{{- end }}
{{- end }}
{{- end }}
{{- end }}